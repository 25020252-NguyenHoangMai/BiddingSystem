<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1500" viewBox="0 0 2600 1500">
  <defs>
    <marker id="inherit" markerWidth="16" markerHeight="14" refX="15" refY="7" orient="auto">
      <path d="M15,7 L1,1 L1,13 Z" fill="white" stroke="black" stroke-width="2"/>
    </marker>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11" fill="none" stroke="black" stroke-width="2"/>
    </marker>
    <style>
      .rel{stroke:#111;stroke-width:2;fill:none}
      .dep{stroke:#111;stroke-width:2;fill:none;stroke-dasharray:9 7}
      .lbl{font:18px Arial,Helvetica,sans-serif;fill:#111}
    </style>
  </defs>

  <text x="1300" y="52" text-anchor="middle" style="font:700 42px Arial,Helvetica,sans-serif">BiddingSystem - Detailed Class Diagram</text>

  <!-- Core relationships -->
  <path class="rel" d="M330 210 L250 315" marker-end="url(#inherit)"/>
  <path class="rel" d="M330 210 L585 315" marker-end="url(#inherit)"/>
  <path class="rel" d="M330 210 L420 600" marker-end="url(#inherit)"/>
  <path class="rel" d="M330 210 L790 600" marker-end="url(#inherit)"/>
  <path class="rel" d="M250 465 L165 580" marker-end="url(#inherit)"/>
  <path class="rel" d="M250 465 L385 580" marker-end="url(#inherit)"/>
  <path class="rel" d="M585 475 L560 610" marker-end="url(#inherit)"/>
  <path class="rel" d="M585 475 L710 610" marker-end="url(#inherit)"/>
  <path class="rel" d="M585 475 L875 610" marker-end="url(#inherit)"/>
  <path class="rel" d="M585 420 C500 500 470 545 420 600" marker-end="url(#arrow)"/>
  <text class="lbl" x="455" y="530">item</text>
  <path class="dep" d="M165 665 C270 665 330 640 420 675" marker-end="url(#arrow)"/>
  <text class="lbl" x="245" y="650">bidderId/winnerId</text>
  <path class="dep" d="M585 420 C420 500 270 535 165 580" marker-end="url(#arrow)"/>
  <text class="lbl" x="325" y="500">sellerId</text>

  <path class="dep" d="M2300 465 C2240 555 2215 610 2215 695" marker-end="url(#arrow)"/>
  <path class="dep" d="M2130 800 C1870 910 1370 925 980 975" marker-end="url(#arrow)"/>
  <path class="dep" d="M1830 365 L1830 480" marker-end="url(#arrow)"/>
  <path class="rel" d="M1720 355 L1720 480" marker-end="url(#arrow)"/>
  <path class="rel" d="M1515 700 L1515 800" marker-end="url(#arrow)"/>
  <path class="rel" d="M1620 700 L1620 800" marker-end="url(#arrow)"/>
  <path class="rel" d="M1515 925 L1515 1030" marker-end="url(#arrow)"/>
  <path class="rel" d="M1620 925 L1620 1030" marker-end="url(#arrow)"/>
  <path class="dep" d="M1715 1185 C1400 1185 1160 1050 960 1010" marker-end="url(#arrow)"/>
  <path class="dep" d="M1870 1185 C1500 760 980 650 750 410" marker-end="url(#arrow)"/>
  <path class="dep" d="M2220 800 C2080 740 1920 720 1740 700" marker-end="url(#arrow)"/>

  <foreignObject x="0" y="70" width="2600" height="1420">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .pkg{position:absolute;border:3px solid #111;background:rgba(248,248,248,.72);box-sizing:border-box}
        .pt{position:absolute;top:-28px;left:0;font:700 21px Arial,Helvetica,sans-serif;background:white;padding:0 8px}
        .cls{position:absolute;border:2px solid #111;background:#fff;box-sizing:border-box;font:15px Consolas,monospace}
        .h{font:700 19px Arial,Helvetica,sans-serif;text-align:center;border-bottom:2px solid #111;padding:7px 4px;background:#f1f1f1}
        .s{font:italic 14px Arial,Helvetica,sans-serif;text-align:center;margin-top:-4px}
        .m{padding:7px 10px;line-height:1.35;border-bottom:1px solid #333}
        .m:last-child{border-bottom:0}
        .note{position:absolute;border:2px solid #111;background:#fff;padding:12px 16px;font:17px Arial,Helvetica,sans-serif;line-height:1.45;box-sizing:border-box}
      </style>

      <div class="pkg" style="left:35px;top:35px;width:965px;height:780px"><div class="pt">package com.auction.model</div></div>
      <div class="cls" style="left:245px;top:65px;width:210px;height:120px"><div class="h">Entity</div><div class="s">abstract, Serializable</div><div class="m">- id: String<br/>+ getId(), setId()</div></div>
      <div class="cls" style="left:75px;top:270px;width:285px;height:160px"><div class="h">User</div><div class="s">abstract</div><div class="m">- username, password<br/>- fullName, role</div><div class="m">+ getters/setters</div></div>
      <div class="cls" style="left:75px;top:535px;width:190px;height:120px"><div class="h">Bidder</div><div class="m">- sellerEnabled<br/>- balance</div><div class="m">+ enableSelling()</div></div>
      <div class="cls" style="left:310px;top:545px;width:150px;height:80px"><div class="h">Admin</div><div class="m">+ constructors</div></div>
      <div class="cls" style="left:495px;top:270px;width:300px;height:170px"><div class="h">Item</div><div class="s">abstract</div><div class="m">- name, description<br/>- itemType, sellerId<br/>- startingPrice</div><div class="m">+ getCategoryDetails()</div></div>
      <div class="cls" style="left:490px;top:565px;width:210px;height:125px"><div class="h">Vehicle</div><div class="m">- model, engineType<br/>- mileage</div><div class="m">+ getCategoryDetails()</div></div>
      <div class="cls" style="left:725px;top:565px;width:165px;height:100px"><div class="h">Electronics</div><div class="m">- brand<br/>+ details()</div></div>
      <div class="cls" style="left:815px;top:690px;width:150px;height:95px"><div class="h">Art</div><div class="m">- artist<br/>+ details()</div></div>
      <div class="cls" style="left:340px;top:570px;width:330px;height:185px"><div class="h">AuctionSession</div><div class="m">- item: Item<br/>- currentPrice, currentWinnerId<br/>- startTime, endTime<br/>- status</div><div class="m">+ getters/setters</div></div>
      <div class="cls" style="left:700px;top:555px;width:265px;height:150px"><div class="h">BidTransaction</div><div class="m">- auctionId, bidderId<br/>- bidAmount<br/>- bidTime</div></div>

      <div class="pkg" style="left:35px;top:860px;width:965px;height:455px"><div class="pt">package com.auction.dto / request / response / exception</div></div>
      <div class="cls" style="left:65px;top:905px;width:380px;height:205px"><div class="h">ItemDTO</div><div class="s">Serializable, JavaFX selectable</div><div class="m">- id, name, description, itemType<br/>- sellerId, sellerUsername<br/>- startingPrice, currentPrice<br/>- model, engineType, mileage<br/>- brand, artist, endTimeMillis</div><div class="m">+ calculateTimeLeft(), selectedProperty()</div></div>
      <div class="cls" style="left:470px;top:905px;width:265px;height:150px"><div class="h">UserSessionDTO</div><div class="m">- id, username, fullName<br/>- role, balance<br/>- sellerEnabled</div><div class="m">+ selectedProperty()</div></div>
      <div class="cls" style="left:760px;top:890px;width:195px;height:65px"><div class="h">Request</div><div class="s">abstract</div></div>
      <div class="cls" style="left:765px;top:990px;width:190px;height:85px"><div class="h">LoginRequest</div><div class="m">- username<br/>- password</div></div>
      <div class="cls" style="left:765px;top:1105px;width:190px;height:110px"><div class="h">RegisterRequest</div><div class="m">- fullName<br/>- username/password<br/>- confirmPassword</div></div>
      <div class="cls" style="left:470px;top:1100px;width:245px;height:95px"><div class="h">Response</div><div class="s">abstract</div><div class="m">- success, message</div></div>
      <div class="cls" style="left:250px;top:1140px;width:190px;height:85px"><div class="h">LoginResponse</div><div class="m">- user: UserSessionDTO</div></div>
      <div class="cls" style="left:65px;top:1140px;width:160px;height:115px"><div class="h">Exception</div><div class="m">AuctionException<br/>Authentication<br/>Balance/Item/User</div></div>

      <div class="pkg" style="left:1030px;top:35px;width:930px;height:1280px"><div class="pt">package com.auction.server</div></div>
      <div class="cls" style="left:1070px;top:85px;width:360px;height:190px"><div class="h">server.network</div><div class="m">SocketServer<br/>- port, auctionController<br/>+ startServer()</div><div class="m">ClientHandler extends Thread<br/>- socket, in/out<br/>+ run(), safeSendResponse()</div></div>
      <div class="cls" style="left:1500px;top:85px;width:385px;height:200px"><div class="h">server.controller</div><div class="m">AuctionController<br/>- authController<br/>+ handleRequest(Request): Response</div><div class="m">AuthController<br/>- userService<br/>+ login(), register()</div></div>
      <div class="cls" style="left:1070px;top:390px;width:815px;height:280px"><div class="h">server.service</div><div class="m">UserService: register, login, changePassword, updateProfile, getAllUsers, getBalance, enableSeller</div><div class="m">ItemService: add/update/remove item, getAll/getById/getByName/getByItemType</div><div class="m">SessionService: sessions ConcurrentMap, create/start/finish/isBiddable/extend/refresh</div><div class="m">BiddingService: placeBid, validateBidInput; AntiSnipingService; AutoBiddingService</div></div>
      <div class="cls" style="left:1070px;top:760px;width:815px;height:245px"><div class="h">server.dao</div><div class="m">DatabaseManager Singleton: getInstance(), getConnection()</div><div class="m">UserDAO: insertUser, enableSeller, updateUser, updatePassword, getUserById, getUserByUsername, getAllUsers, updateBalance, deleteUser</div><div class="m">ItemDAO: insertItem, updateItem, deleteItem, getAllItems, getItemById, getItemByName, getItemByItemType; AuctionDAO; BidDAO</div></div>
      <div class="cls" style="left:1070px;top:1085px;width:390px;height:150px"><div class="h">server.factory</div><div class="m">ItemFromDTOFactory<br/>+ createItem(ItemDTO): Item<br/>switch VEHICLE/ELECTRONICS/ART</div><div class="m">UserFromDTOFactory*, UserRegistrationFactory*</div></div>
      <div class="cls" style="left:1585px;top:1095px;width:250px;height:95px"><div class="h">MainServer</div><div class="m">wires UserService, AuthController, SocketServer</div></div>

      <div class="pkg" style="left:1990px;top:35px;width:560px;height:780px"><div class="pt">package com.auction.client</div></div>
      <div class="cls" style="left:2025px;top:85px;width:185px;height:90px"><div class="h">MainApp</div><div class="m">extends Application<br/>start(), main()</div></div>
      <div class="cls" style="left:2025px;top:215px;width:490px;height:210px"><div class="h">JavaFX Controllers</div><div class="m">LoginController: loginButtonOnAction<br/>RegisterController: handleRegister<br/>MainController: load/search/add/profile<br/>AdminController: table, loadData, filters<br/>AddProductController, ProfileController</div></div>
      <div class="cls" style="left:2025px;top:500px;width:270px;height:145px"><div class="h">Client Services</div><div class="m">AuthService.login()<br/>ProductService.getAllProducts()<br/>UserClientService.getAllUsers(), deleteUser()</div></div>
      <div class="cls" style="left:2320px;top:500px;width:195px;height:145px"><div class="h">ClientSocket</div><div class="s">Singleton</div><div class="m">- socket, in/out<br/>+ connect/send/receive/close</div></div>
      <div class="cls" style="left:2025px;top:685px;width:230px;height:75px"><div class="h">ClientSession</div><div class="m">currentUser</div></div>
      <div class="cls" style="left:2285px;top:685px;width:230px;height:75px"><div class="h">SceneUtil</div><div class="m">changeScene()</div></div>

      <div class="note" style="left:1030px;top:1350px;width:1520px;height:90px">
        Main flow: Client Controller -> Client Service -> ClientSocket -> Request/Response -> SocketServer/ClientHandler -> AuctionController -> AuthController/Service -> DAO -> DatabaseManager -> SQL Server. DAO maps Model/DTO; factory maps ItemDTO to Vehicle/Electronics/Art.
      </div>
      <div class="note" style="left:35px;top:1360px;width:965px;height:65px">
        * UserDTO, UserFromDTOFactory and UserRegistrationFactory are commented in source, so the diagram marks them as inactive/reference in the PlantUML file.
      </div>
    </div>
  </foreignObject>
</svg>
