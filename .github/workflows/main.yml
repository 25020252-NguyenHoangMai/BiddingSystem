name: Java CI với Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2025-latest
        env:
          MSSQL_SA_PASSWORD: ${{ secrets.DB_PASS }}
          ACCEPT_EULA: Y
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $${MSSQL_SA_PASSWORD} -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      # 1. Checkout code
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # 3. Install sqlcmd (client trên runner)
      - name: Install sqlcmd
        run: |
          sudo apt-get update
          sudo apt-get install -y curl apt-transport-https gnupg
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      # 4. Wait until SQL Server is REALLY ready
      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            sqlcmd -S localhost -U sa -P "${{ secrets.DB_PASS }}" -C -Q "SELECT 1" && break
            echo "Waiting for SQL Server..."
            sleep 5
          done

      # 5. Create database + import schema
      - name: Setup database
        run: |
          sqlcmd -S localhost -U sa -P "${{ secrets.DB_PASS }}" -C -Q "IF DB_ID('BiddingSystem') IS NULL CREATE DATABASE BiddingSystem"

          sqlcmd -S localhost -U sa -P "${{ secrets.DB_PASS }}" \
          -d BiddingSystem -C -i database/init.sql

      # 6. Build + Test
      - name: Build and run tests
        run: mvn clean install
        env:
          DB_URL: jdbc:sqlserver://localhost:1433;databaseName=BiddingSystem;encrypt=true;trustServerCertificate=true
          DB_USER: sa
          DB_PASS: ${{ secrets.DB_PASS }}

      # 7. Upload artifact
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: auction-app-file
          path: target/*.jar