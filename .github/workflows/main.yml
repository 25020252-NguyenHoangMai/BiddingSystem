name: Java CI với Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: Stevejobs@14
          ACCEPT_EULA: Y
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Stevejobs@14' -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install sqlcmd
        run: |
          sudo apt-get update
          sudo apt-get install -y curl apt-transport-https gnupg
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            sqlcmd -S localhost -U sa -P "Stevejobs@14" -C -Q "SELECT 1" && break
            echo "Waiting for SQL Server..."
            sleep 5
          done

      - name: Setup database
        run: |
          sqlcmd -S localhost -U sa -P "Stevejobs@14" -C -Q "IF DB_ID('BiddingSystem') IS NULL CREATE DATABASE BiddingSystem"

          sqlcmd -S localhost -U sa -P "Stevejobs@14" \
          -d BiddingSystem -C -i database/init.sql

      - name: Build and run tests
        run: mvn clean install
        env:
          DB_URL: jdbc:sqlserver://localhost:1433;databaseName=BiddingSystem;encrypt=true;trustServerCertificate=true
          DB_USER: sa
          DB_PASS: Stevejobs@14

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v5
        with:
          name: auction-app-file
          path: target/*.jar